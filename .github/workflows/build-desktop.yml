name: Build desktop installers

# Builds direct-download installers for all three OSes on their native runners:
#   Windows -> NSIS setup .exe   (the Microsoft Store MSIX is build-msix.yml)
#   macOS   -> .dmg
#   Linux   -> .AppImage + .deb
# Artifacts are unsigned. For signed/notarized releases set the signing secrets
# (see PUBLISHING.md). Run from Actions -> Run workflow, or push a v* tag.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# Needed so a v* tag build can publish the installers to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
            artifact: windows-exe
          - os: macos-latest
            target: mac
            arch: arm64
            artifact: macos-dmg
          - os: ubuntu-latest
            target: linux
            arch: x64
            artifact: linux-appimage-deb
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Build unsigned; add signing secrets later for release builds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # 8.4 — the composer.lock resolved to Symfony 8.1 (requires php >=8.4.1).
          php-version: '8.4'
          extensions: zip, intl, sockets, fileinfo, mbstring, curl, openssl, gd, exif, pdo_sqlite
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      # native:build bundles the app's .env into the package (BuildCommand reads it);
      # .env is gitignored, so create one from the example + an app key on CI.
      - name: Prepare Laravel environment
        shell: bash
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Linux packaging deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot

      - name: Build ${{ matrix.target }} (${{ matrix.arch }})
        run: php artisan native:build ${{ matrix.target }} ${{ matrix.arch }} --no-interaction

      # Copy each installer to a STABLE, unversioned name so the public download
      # page (Fullness) can link to /releases/latest/download/<name> reliably.
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p artifact
          pick() { find . -name "$1" -not -path '*/node_modules/*' 2>/dev/null | head -1; }
          case "${{ matrix.target }}" in
            mac)
              f=$(pick '*.dmg');      [ -n "$f" ] && cp "$f" "artifact/ZKTeco-User-Sync-mac-arm64.dmg" ;;
            win)
              f=$(pick '*.exe');      [ -n "$f" ] && cp "$f" "artifact/ZKTeco-User-Sync-win-x64.exe" ;;
            linux)
              a=$(pick '*.AppImage'); [ -n "$a" ] && cp "$a" "artifact/ZKTeco-User-Sync-linux-x86_64.AppImage"
              d=$(pick '*.deb');      [ -n "$d" ] && cp "$d" "artifact/ZKTeco-User-Sync-linux-amd64.deb" ;;
          esac
          ls -la artifact
          if [ -z "$(ls -A artifact 2>/dev/null)" ]; then echo 'No installer produced'; exit 1; fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact/*
          if-no-files-found: error

      # On a v* tag, publish the stably-named installers to the release so the
      # Fullness download page's /releases/latest/download/<name> links resolve.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
          fail_on_unmatched_files: true
