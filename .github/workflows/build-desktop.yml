name: Build desktop installers

# Builds direct-download installers for all three OSes on their native runners:
#   Windows -> NSIS setup .exe   (the Microsoft Store MSIX is build-msix.yml)
#   macOS   -> .dmg
#   Linux   -> .AppImage + .deb
# Artifacts are unsigned. For signed/notarized releases set the signing secrets
# (see PUBLISHING.md). Run from Actions -> Run workflow, or push a v* tag.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# Needed so a v* tag build can publish the installers to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: x64
            artifact: windows-exe
          - os: macos-latest
            target: mac
            arch: arm64
            artifact: macos-dmg
          - os: ubuntu-latest
            target: linux
            arch: x64
            artifact: linux-appimage-deb
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      # Build unsigned; add signing secrets later for release builds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # electron-updater: emit the latest*.yml update metadata + bake app-update.yml
      # into the package so the app self-updates from GitHub Releases (owner/repo come
      # from the bundled .env via .env.example).
      NATIVEPHP_UPDATER_ENABLED: 'true'
      NATIVEPHP_UPDATER_PROVIDER: github
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # 8.4 — the composer.lock resolved to Symfony 8.1 (requires php >=8.4.1).
          php-version: '8.4'
          extensions: zip, intl, sockets, fileinfo, mbstring, curl, openssl, gd, exif, pdo_sqlite
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      # native:build bundles the app's .env into the package (BuildCommand reads it);
      # .env is gitignored, so create one from the example + an app key on CI.
      - name: Prepare Laravel environment
        shell: bash
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Linux packaging deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm fakeroot

      - name: Build ${{ matrix.target }} (${{ matrix.arch }})
        run: php artisan native:build ${{ matrix.target }} ${{ matrix.arch }} --no-interaction

      # Stage two things:
      #  (a) STABLE-named copies for the Fullness download page's /latest/download links.
      #  (b) electron-builder's ORIGINAL installers + latest*.yml for the self-updater
      #      (electron-updater matches the exact filename inside latest*.yml, so the
      #      original must be present too). Windows + Linux self-update unsigned; mac
      #      is dmg-only (no latest-mac.yml) so the unsigned mac updater is a no-op.
      - name: Stage release files
        shell: bash
        run: |
          set -e
          mkdir -p upload
          cd nativephp/electron/dist
          # The updater matches the exact filename inside latest*.yml, but electron-builder
          # writes files to disk with spaces while the yml references hyphenated names — so
          # derive the target name straight from the yml's `path:` field (bulletproof).
          yml_path() { grep -E '^path:' "$1" 2>/dev/null | head -1 | sed -E "s/^path:[[:space:]]*//; s/^['\"]//; s/['\"]$//"; }
          case "${{ matrix.target }}" in
            win)
              disk=$(find . -maxdepth 1 -name '*.exe' -size +40M | head -1)
              cp "$disk" "../../../upload/ZKTeco-User-Sync-win-x64.exe"          # stable name for the Fullness page
              name=$(yml_path latest.yml)
              if [ -n "$name" ]; then
                cp "$disk" "../../../upload/$name"                               # exact name latest.yml references
                [ -f "$disk.blockmap" ] && cp "$disk.blockmap" "../../../upload/$name.blockmap"
                cp latest.yml ../../../upload/
              fi
              ;;
            linux)
              disk=$(find . -maxdepth 1 -name '*.AppImage' -size +40M | head -1)
              cp "$disk" "../../../upload/ZKTeco-User-Sync-linux-x86_64.AppImage"
              deb=$(find . -maxdepth 1 -name '*.deb' | head -1)
              [ -n "$deb" ] && cp "$deb" "../../../upload/ZKTeco-User-Sync-linux-amd64.deb"
              name=$(yml_path latest-linux.yml)
              if [ -n "$name" ]; then
                cp "$disk" "../../../upload/$name"
                cp latest-linux.yml ../../../upload/
              fi
              ;;
            mac)
              # Unsigned mac can't self-update (Squirrel) — ship the arm64 dmg only, no yml.
              disk=$(find . -maxdepth 1 -name '*arm64.dmg' -size +40M | head -1)
              cp "$disk" "../../../upload/ZKTeco-User-Sync-mac-arm64.dmg"
              ;;
          esac
          echo "staged:"; ls -la ../../../upload
          [ -n "$(ls -A ../../../upload 2>/dev/null)" ] || { echo 'No release files staged'; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: upload/*
          if-no-files-found: error

      # On a v* tag, publish the installers + latest*.yml to the release. The Fullness
      # download page resolves the (versioned) installer URLs from the GitHub API.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          fail_on_unmatched_files: true
